name: Release Workflow

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Run lint checks
        run: npx eslint "{src,tests}/**/*.js"

      - name: Regenerate typedefs
        run: npm run generate:typedefs

      - name: Verify version lockstep
        run: |
          node -e "const p=require('./package.json');const l=require('./package-lock.json');const root=(l.packages||{})[''];if(l.version!==p.version||!root||root.version!==p.version){console.error('Version mismatch: package='+p.version+' lock='+l.version+' root='+(root&&root.version));process.exit(1)}console.log('Version sync OK: '+p.version)"

      - name: Validate package contents
        run: |
          npm pack --json > npm-pack.json
          node -e "const fs=require('fs');const p=require('./package.json');const pack=JSON.parse(fs.readFileSync('npm-pack.json','utf8'))[0];const forbiddenPrefixes=['tests/','docs/','.github/'];const files=pack.files.map(f=>f.path);const forbidden=files.filter(path=>forbiddenPrefixes.some(prefix=>path.startsWith(prefix))||path.endsWith('.tgz'));if(pack.version!==p.version){console.error('Packed version '+pack.version+' does not match package version '+p.version);process.exit(1)}if(forbidden.length){console.error('Forbidden files in npm pack:\\n'+forbidden.join('\\n'));process.exit(1)}console.log('Pack validation OK: '+pack.entryCount+' files')"
          rm -f npm-pack.json ./*.tgz

      # - name: Upload coverage reports to Codecov
      #   uses: codecov/codecov-action@v4.0.1
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
      #     slug: NaeuralEdgeProtocol/js-client

      - name: Check if version changed
        id: version_check
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

          BEFORE_SHA="${{ github.event.before }}"
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "previous_version=none" >> "$GITHUB_OUTPUT"
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git cat-file -e "${BEFORE_SHA}:package.json" 2>/dev/null; then
            PREVIOUS_VERSION=$(git show "${BEFORE_SHA}:package.json" | node -e "let data='';process.stdin.on('data',d=>data+=d);process.stdin.on('end',()=>{process.stdout.write(JSON.parse(data).version);});")
          else
            PREVIOUS_VERSION=unknown
          fi

          echo "previous_version=$PREVIOUS_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$NEW_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Log version change decision
        run: |
          echo "Current version: ${{ steps.version_check.outputs.new_version }}"
          echo "Previous version: ${{ steps.version_check.outputs.previous_version }}"
          echo "Version changed: ${{ steps.version_check.outputs.version_changed }}"

      - name: Check if version already exists on npm
        if: steps.version_check.outputs.version_changed == 'true'
        id: npm_version_check
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version --registry=https://registry.npmjs.org > /dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package to npm
        if: steps.version_check.outputs.version_changed == 'true' && steps.npm_version_check.outputs.already_published != 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip publish when version is unchanged
        if: steps.version_check.outputs.version_changed != 'true'
        run: echo "Version unchanged. Skipping npm publish."

      - name: Skip publish when version already exists on npm
        if: steps.version_check.outputs.version_changed == 'true' && steps.npm_version_check.outputs.already_published == 'true'
        run: echo "Version already published on npm. Skipping npm publish."

      - name: Check if GitHub release already exists
        if: steps.version_check.outputs.version_changed == 'true'
        id: release_check
        run: |
          VERSION="${{ steps.version_check.outputs.new_version }}"
          API_URL="https://api.github.com/repos/${{ github.repository }}/releases/tags/${VERSION}"
          if curl -fsS -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/vnd.github+json" "$API_URL" > /dev/null; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate changelog
        if: steps.version_check.outputs.version_changed == 'true' && steps.release_check.outputs.release_exists != 'true'
        run: |
          git fetch --tags --force
          LAST_TAG=$(git describe --tags --abbrev=0 "$(git rev-list --tags --max-count=1)" 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            git log "${LAST_TAG}..HEAD" --pretty=format:"%h - %s" > CHANGELOG.md
          else
            git log --pretty=format:"%h - %s" > CHANGELOG.md
          fi
          echo "Changelog generated"

      - name: Create GitHub release
        if: steps.version_check.outputs.version_changed == 'true' && steps.release_check.outputs.release_exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version_check.outputs.new_version }}"
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --notes-file CHANGELOG.md \
            --target "${{ github.sha }}"

      - name: Skip release when tag release already exists
        if: steps.version_check.outputs.version_changed == 'true' && steps.release_check.outputs.release_exists == 'true'
        run: echo "GitHub release already exists for this version. Skipping release creation."
